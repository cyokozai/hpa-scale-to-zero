repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

releases:
  - name: prometheus
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus
    version: "29.12.0"
    values:
      - alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        kube-state-metrics:
          enabled: false
        prometheus-node-exporter:
          enabled: false
        server:
          persistentVolume:
            enabled: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
        serverFiles:
          prometheus.yml:
            scrape_configs:
              - job_name: pushgateway
                scrape_interval: 15s
                honor_labels: true
                static_configs:
                  - targets:
                      - prometheus-pushgateway.monitoring.svc:9091
                metric_relabel_configs:
                  - source_labels: []
                    target_label: namespace
                    replacement: default

  - name: prometheus-pushgateway
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus-pushgateway
    version: "3.6.1"
    values:
      - resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi

  - name: prometheus-adapter
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus-adapter
    version: "5.3.0"
    values:
      - prometheus:
          url: http://prometheus-server.monitoring.svc
          port: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        rules:
          default: false
          external:
            - seriesQuery: 'queue_length{job!="",namespace!=""}'
              resources:
                template: "<<.Resource>>"
              name:
                as: "queue_length"
              metricsQuery: 'sum(<<.Series>>{<<.LabelMatchers>>}) by (job)'
