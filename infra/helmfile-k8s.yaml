repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

releases:
  # prometheus-adapter
  # Prometheus の kafka_consumergroup_lag を External Metrics API に変換する。
  # K8s HPA が /apis/external.metrics.k8s.io 経由でラグを取得できるようになる。
  # KEDA が存在しないクラスターでのみ使用する（v1beta1.external.metrics.k8s.io の競合回避）。
  - name: prometheus-adapter
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus-adapter
    version: "4.11.0"
    values:
      - prometheus:
          url: http://prometheus-server.monitoring.svc
          port: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        rules:
          default: false
          external:
            - seriesQuery: 'kafka_consumergroup_lag{consumergroup!="",topic!=""}'
              # template: "<<.Resource>>" で namespace リソース → namespace ラベルへ変換する
              # Prometheus 側で metric_relabel_configs により namespace=default を付与済み
              resources:
                template: "<<.Resource>>"
              name:
                as: "kafka_consumergroup_lag_total"
              # consumergroup と topic ラベルでフィルタし、パーティション分を合計する
              metricsQuery: 'sum(<<.Series>>{<<.LabelMatchers>>}) by (consumergroup, topic)'
