repositories:
  - name: kedacore
    url: https://kedacore.github.io/charts

releases:
  # KEDA v2.16
  # KEDAはHPAをラップして動作する。ScaledObjectを作成するとHPAを自動生成し、
  # kafka_scaler.goがKafka BrokerへsaramaでConsumer Group Lagを直接問い合わせる。
  # KEDA metrics-apiserver が v1beta1.external.metrics.k8s.io を占有するため、
  # prometheus-adapter と同一クラスターには共存できない。
  - name: keda
    namespace: keda
    createNamespace: true
    chart: kedacore/keda
    version: "2.16.0"
    values:
      - resources:
          operator:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
