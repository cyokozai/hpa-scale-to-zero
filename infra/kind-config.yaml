kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    # v1.36 の node image を明示して再現性を確保する。
    # 最新パッチバージョンは https://hub.docker.com/r/kindest/node/tags で確認すること。
    image: kindest/node:v1.36.0
    # HPAScaleToZero Feature Gate を kube-apiserver と kube-controller-manager の両方で有効化する。
    # kube-controller-manager 側でも有効にしないと HPA reconcile ループが Feature Gate を参照できない。
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            feature-gates: "HPAScaleToZero=true"
        controllerManager:
          extraArgs:
            feature-gates: "HPAScaleToZero=true"

  - role: worker
  - role: worker
